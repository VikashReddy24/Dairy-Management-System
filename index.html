<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>பால் மேலாண்மை அமைப்பு</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐄 பால் மேலாண்மை அமைப்பு</h1>
            <div id="storage-status" style="font-size: 12px; margin-top: 5px; opacity: 0.9;"></div>
            <nav class="main-nav">
                <button class="nav-btn active" data-view="customers">வாடிக்கையாளர்கள்</button>
                <button class="nav-btn" data-view="reports">அறிக்கைகள்</button>
                <button class="nav-btn" data-view="billing">பில்லிங்</button>
                <button class="nav-btn" data-view="settings">அமைப்புகள்</button>
            </nav>
        </header>

        <!-- Customers View -->
        <section id="customers-view" class="view active">
            <div class="section-header">
                <h2>வாடிக்கையாளர் மேலாண்மை</h2>
                <button class="btn btn-primary" id="add-customer-btn">+ வாடிக்கையாளர் சேர்</button>
            </div>
            
            <div class="customer-list" id="customer-list">
                <!-- Customer cards will be inserted here -->
            </div>
        </section>

        <!-- Customer Dashboard View -->
        <section id="customer-dashboard-view" class="view">
            <div class="section-header">
                <button class="btn btn-secondary" id="back-to-customers">← பின்</button>
                <h2 id="customer-dashboard-name">வாடிக்கையாளர் டாஷ்போர்டு</h2>
            </div>
            
            <div class="milk-entry-section">
                <h3>தினசரி பால் பதிவு</h3>
                <div class="entry-form">
                    <label>
                        <span>தேதி:</span>
                        <input type="date" id="milk-entry-date" required>
                    </label>
                    <label>
                        <span>அளவு (லிட்டர்):</span>
                        <input type="number" id="milk-entry-quantity" step="0.01" min="0" placeholder="0.00" required>
                    </label>
                    <button class="btn btn-primary" id="save-milk-entry">பதிவு சேமி</button>
                </div>
                
                <div class="calendar-view" id="milk-calendar">
                    <!-- Calendar entries will be inserted here -->
                </div>
            </div>
        </section>

        <!-- Reports View -->
        <section id="reports-view" class="view">
            <div class="section-header">
                <h2>அறிக்கைகள்</h2>
            </div>
            
            <div class="report-filters">
                <label>
                    <span>வாடிக்கையாளர்:</span>
                    <select id="report-customer-select">
                        <option value="all">அனைத்து வாடிக்கையாளர்கள்</option>
                    </select>
                </label>
                <label>
                    <span>இருந்து தேதி:</span>
                    <input type="date" id="report-from-date" required>
                </label>
                <label>
                    <span>வரை தேதி:</span>
                    <input type="date" id="report-to-date" required>
                </label>
                <button class="btn btn-primary" id="generate-report-btn">அறிக்கை உருவாக்க</button>
            </div>
            
            <div class="report-results" id="report-results">
                <div class="report-summary" id="report-summary"></div>
                <div class="report-calendar" id="report-calendar"></div>
                <button class="btn btn-success" id="download-report-pdf" style="display: none;">PDF பதிவிறக்க</button>
            </div>
        </section>

        <!-- Billing View -->
        <section id="billing-view" class="view">
            <div class="section-header">
                <h2>மாதாந்திர பில்லிங்</h2>
            </div>
            
            <div class="billing-section">
                <div class="billing-filters">
                    <label>
                        <span>வாடிக்கையாளர்:</span>
                        <select id="billing-customer-select" required>
                            <option value="">வாடிக்கையாளர் தேர்ந்தெடு</option>
                        </select>
                    </label>
                    <label>
                        <span>மாதம்:</span>
                        <input type="month" id="billing-month" required>
                    </label>
                    <button class="btn btn-primary" id="generate-bill-btn">பில் உருவாக்க</button>
                </div>
                
                <div class="bill-preview" id="bill-preview" style="display: none;">
                    <div class="bill-content" id="bill-content"></div>
                    <button class="btn btn-success" id="download-bill-pdf">பில் PDF பதிவிறக்க</button>
                </div>
            </div>
        </section>

        <!-- Settings View -->
        <section id="settings-view" class="view">
            <div class="section-header">
                <h2>அமைப்புகள்</h2>
            </div>
            
            <div class="settings-section">
                <label>
                    <span>பால் விகிதம் (லிட்டருக்கு):</span>
                    <input type="number" id="milk-rate" step="0.01" min="0" placeholder="0.00" required>
                </label>
                <button class="btn btn-primary" id="save-rate-btn">விகிதம் சேமி</button>
                <div class="current-rate" id="current-rate-display"></div>
            </div>
        </section>
    </div>

    <!-- Add Customer Modal -->
    <div id="customer-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modal-title">வாடிக்கையாளர் சேர்</h3>
            <form id="customer-form">
                <label>
                    <span>வாடிக்கையாளர் பெயர்:</span>
                    <input type="text" id="customer-name-input" required>
                </label>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">சேமி</button>
                    <button type="button" class="btn btn-secondary" id="cancel-customer-btn">ரத்து</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // Fallback if CDN fails - app will still work without PDF
        window.jspdf = window.jspdf || null;
    </script>
    <script src="app.js"></script>
</body>
</html>
